services:
  # Caddy - Reverse Proxy & HTTPS
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - FRONTEND_DOMAIN=${FRONTEND_DOMAIN:?FRONTEND_DOMAIN must be set in .env}
      - API_DOMAIN=${API_DOMAIN:?API_DOMAIN must be set in .env}
    depends_on:
      - api
      - frontend
    restart: unless-stopped
    networks:
      - botbuilder-network

  # Frontend - React App
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:?VITE_API_URL must be set in .env}
    restart: unless-stopped
    networks:
      - botbuilder-network

  # Bot Builder API
  api:
    build: .
    # No public port - accessed via Caddy reverse proxy only
    env_file: .env
    environment:
      # Database config (nested with __)
      - DATABASE__URL=postgresql+asyncpg://botbuilder:${DB_PASSWORD}@db:5432/botbuilder
      # Redis config (nested with __, Redis is mandatory)
      - REDIS__URL=redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/0
      # Security config (nested with __)
      - SECURITY__SECRET_KEY=${SECRET_KEY}
      - SECURITY__ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - SECURITY__ALGORITHM=HS256
      - SECURITY__ACCESS_TOKEN_EXPIRE_MINUTES=4320
      # Evolution API config (nested with __)
      - EVOLUTION_API__URL=http://evolution-api:8080
      - EVOLUTION_API__API_KEY=${EVOLUTION_API_KEY}
      - EVOLUTION_API__ENABLED=true
      - EVOLUTION_API__WEBHOOK_BASE_URL=http://api:8000
      # App config (lowercase)
      - environment=${ENVIRONMENT:-development}
      - debug=${DEBUG:-True}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution-api:
        condition: service_started
    restart: unless-stopped
    networks:
      - botbuilder-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=botbuilder
      - POSTGRES_USER=botbuilder
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # Localhost only - use SSH tunnel for remote access
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botbuilder"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - botbuilder-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"  # Localhost only - use SSH tunnel for remote access
    restart: unless-stopped
    networks:
      - botbuilder-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"  # Localhost only - use SSH tunnel for remote access
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - botbuilder-network

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"  # Localhost only - use SSH tunnel for remote access
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - botbuilder-network

  # Evolution API for WhatsApp Integration (v2.3.7 - built from source)
  evolution-api:
    build:
      context: .
      dockerfile: Dockerfile.evolution
    # No public port - accessed internally by API service only
    environment:
      # Server Configuration
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://evolution-api:8080
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true

      # Authentication
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # Instance Management
      - DEL_INSTANCE=false
      - DEL_TEMP_INSTANCES=false

      # Database Configuration (PostgreSQL via Prisma)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://botbuilder:${DB_PASSWORD}@db:5432/evolution?schema=public
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_api
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true

      # Redis Cache Configuration
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://:${REDIS_PASSWORD:-changeme_redis_password}@redis:6379/6
      - CACHE_REDIS_PREFIX_KEY=evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false

      # Session Configuration
      - CONFIG_SESSION_PHONE_CLIENT=Bot Builder
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1031369562

      # QR Code Configuration
      - QRCODE_LIMIT=60
      - QRCODE_COLOR=#175197

      # Logging
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO
      - LOG_COLOR=true
      - LOG_BAILEYS=error

      # Webhook Configuration (disabled - using instance-specific webhooks)
      - WEBHOOK_GLOBAL_ENABLED=false
      - WEBHOOK_GLOBAL_URL=
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false

      # Webhook Events (enable specific events to be fired)
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_MESSAGES_DELETE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false

      # Language
      - LANGUAGE=en
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - botbuilder-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  evolution_instances:
    driver: local
  evolution_store:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  botbuilder-network:
    driver: bridge
