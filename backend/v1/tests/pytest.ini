[pytest]
pythonpath = .
testpaths = .

# Test markers
markers =
    unit: Unit tests (fast, isolated, < 1s per test)
    integration: Integration tests (multi-component, 1-5s per test)
    e2e: End-to-end tests (complete scenarios, 5-30s per test)
    security: Security tests
    slow: Slow tests (>5s)
    validators: Validator component tests
    processors: Processor component tests
    core: Core engine tests
    utils: Utility function tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -ra
    --strict-markers
    --tb=short
    -v
    --disable-warnings

# Ignore patterns
norecursedirs = .git .tox dist build *.egg __pycache__

# Speed-based test execution examples:
# pytest unit/                          # Run all unit tests (fast)
# pytest integration/                   # Run integration tests
# pytest e2e/                           # Run end-to-end tests
# pytest security/                      # Run security tests
# pytest unit/processors/               # Run processor unit tests only
# pytest -m unit                        # Run tests marked as unit
# pytest -m "unit and processors"       # Run unit tests for processors
# pytest -k "test_prompt"               # Run tests matching "prompt"
