[pytest]
# Pytest configuration for Bot Builder Test Suite
# Based on BOT_BUILDER_SPECIFICATIONS.md

# Python paths
pythonpath = .
testpaths = tests

# Async support
asyncio_mode = auto

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test markers for organization
markers =
    unit: Unit tests (isolated components)
    integration: Integration tests (multiple components)
    e2e: End-to-end flow tests
    security: Security-related tests
    validation: Flow validation tests
    prompt: PROMPT node tests
    menu: MENU node tests
    api_action: API_ACTION node tests
    logic: LOGIC_EXPRESSION node tests
    message: MESSAGE node tests
    end: END node tests
    template: Template engine tests
    session: Session management tests
    routing: Routing and condition tests
    slow: Tests that take longer to run

# Output and reporting
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=5
    -ra

# Coverage settings (optional)
# Uncomment to enable coverage reporting
# --cov=app
# --cov-report=html
# --cov-report=term-missing:skip-covered
# --cov-fail-under=80

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test timeout (optional)
# timeout = 300
# timeout_method = thread
